<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gracias | Cabaña Carapé</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f4ef;
      color: #2c2a26;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; margin-bottom: 1rem; }
    p { margin-bottom: 2rem; opacity: 0.9; }
    a {
      display: inline-block;
      padding: 1rem 2rem;
      background: #2c2a26;
      color: #f7f4ef;
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: background 0.3s;
    }
    a:hover { background: #4a4742; }
  </style>
</head>
<body>
  <div>
    <h1>¡Gracias!</h1>
    <p>Tu mensaje fue enviado correctamente. Te responderemos en las próximas 24 horas.</p>

</html>
